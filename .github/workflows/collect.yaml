name: Collect
on:
  # executed once a week on Sundays at 00:00
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}
  cancel-in-progress: true

env:
  # time zone
  TZ: Asia/Shanghai

  # github access token
  GIST_PAT: ${{ secrets.GIST_PAT }}

  # github username and gist id, separated by '/'
  GIST_LINK: ${{ secrets.GIST_LINK }}

  # the url to the list of airports that you maintain yourself
  # each line include domain, coupon and invitation code, the domain must be included, and the latter two items are optional
  CUSTOMIZE_LINK: ${{ secrets.CUSTOMIZE_LINK }}

  # include special protocols, such as vless hysteria2 and hysteria
  ENABLE_SPECIAL_PROTOCOLS: ${{ vars.ENABLE_SPECIAL_PROTOCOLS }}

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: "x64"
          cache: "pip"

      - name: Install
        run: pip3 install -r requirements.txt

      - name: Check
        run: |
          if [ -z "$GIST_PAT" ]; then
              echo "Error: environment 'GIST_PAT' cannot be empty"
              exit 1
          fi

          if [ -z "$GIST_LINK" ]; then
              echo "Error: environment 'GIST_LINK' cannot be empty"
              exit 1
          fi

          LINK_PARTS=$(echo "$GIST_LINK" | awk -F'/' 'NF==2 && $1!="" && $2!=""')
          if [ -z "$LINK_PARTS" ]; then
              echo "Error: environment 'GIST_LINK' is not valid, should be 'username/gist_id' format"
              exit 1
          fi

      - name: Inject Extra Inputs
        env:
          EXTRA_GIST_LINK: ${{ secrets.EXTRA_GIST_LINK }}
          EXTRA_GIST_PAT: ${{ secrets.EXTRA_GIST_PAT }}
        run: |
          if [ -z "$EXTRA_GIST_LINK" ] || [ -z "$EXTRA_GIST_PAT" ]; then
              echo "Skip extra input injection because EXTRA_GIST_LINK or EXTRA_GIST_PAT is empty"
              exit 0
          fi

          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          def normalize_gist_id(value: str) -> str:
              value = (value or "").strip()
              if not value:
                  return ""
              if value.startswith("https://gist.github.com/"):
                  value = value.rstrip("/").split("/")[-1]
              elif "/" in value:
                  value = value.split("/", maxsplit=1)[1].strip()
              return value

          def read_url(url: str, headers: dict | None = None) -> str:
              request = urllib.request.Request(url=url, headers=headers or {"User-Agent": "aggregator-actions"})
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.read().decode("utf-8")

          def read_gist_file(files: dict, filename: str, headers: dict) -> str:
              target = files.get(filename)
              if not target:
                  return ""
              content = target.get("content", "")
              if target.get("truncated"):
                  content = read_url(target["raw_url"], headers=headers)
              return content

          def merge_contents(*contents: str) -> list[str]:
              merged = []
              seen = set()
              for content in contents:
                  if not content:
                      continue
                  for line in content.splitlines():
                      line = line.strip()
                      if line and line not in seen:
                          seen.add(line)
                          merged.append(line)
              return merged

          gist_id = normalize_gist_id(os.environ.get("EXTRA_GIST_LINK", ""))
          gist_token = (os.environ.get("EXTRA_GIST_PAT", "") or "").strip()
          if not gist_id or not re.fullmatch(r"[0-9a-fA-F]+", gist_id):
              raise SystemExit("Error: EXTRA_GIST_LINK is invalid")
          if not gist_token:
              raise SystemExit("Error: EXTRA_GIST_PAT is empty")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {gist_token}",
              "User-Agent": "aggregator-actions",
          }

          request = urllib.request.Request(
              url=f"https://api.github.com/gists/{gist_id}",
              headers=headers,
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))

          files = payload.get("files", {})

          subscribes_path = Path("data/subscribes.txt")
          subscribes_path.parent.mkdir(parents=True, exist_ok=True)
          extra_subscribes = read_gist_file(files, "subscribes.txt", headers)
          existing_subscribes = subscribes_path.read_text(encoding="utf-8") if subscribes_path.exists() else ""
          merged_subscribes = merge_contents(existing_subscribes, extra_subscribes)
          if merged_subscribes:
              with subscribes_path.open("w", encoding="utf-8", newline="\n") as handle:
                  handle.write("\n".join(merged_subscribes) + "\n")
              existing_count = len(merge_contents(existing_subscribes))
              extra_count = len(merged_subscribes) - existing_count
              print(f"Injected extra subscribes into {subscribes_path}, added {max(extra_count, 0)} line(s)")
          else:
              print("Skip extra subscribes injection because subscribes.txt was not found in extra gist")

          base_customize = (os.environ.get("CUSTOMIZE_LINK", "") or "").strip()
          base_customize_content = ""
          if base_customize:
              if re.match(r"^(https?|ftp)://", base_customize):
                  try:
                      base_customize_content = read_url(base_customize)
                  except Exception as exc:
                      print(f"Warning: failed to load existing CUSTOMIZE_LINK: {exc}")
              else:
                  local_customize = Path("data") / base_customize
                  if local_customize.exists() and local_customize.is_file():
                      base_customize_content = local_customize.read_text(encoding="utf-8")
                  else:
                      print(f"Warning: existing CUSTOMIZE_LINK file was not found: {local_customize}")

          extra_customize = read_gist_file(files, "CUSTOMIZE_LINK.txt", headers)
          merged_customize = merge_contents(base_customize_content, extra_customize)
          if merged_customize:
              customize_path = Path("data/CUSTOMIZE_LINK.txt")
              with customize_path.open("w", encoding="utf-8", newline="\n") as handle:
                  handle.write("\n".join(merged_customize) + "\n")

              github_env = (os.environ.get("GITHUB_ENV", "") or "").strip()
              if github_env:
                  with open(github_env, "a", encoding="utf-8", newline="\n") as handle:
                      handle.write("CUSTOMIZE_LINK=CUSTOMIZE_LINK.txt\n")

              print(f"Injected customize lines into {customize_path}, total {len(merged_customize)} line(s)")
          else:
              print("Skip extra customize injection because no customize content is available")
          PY

      - name: Collect
        run: python -u subscribe/collect.py --all --overwrite --skip

      - name: Timestamp
        run: date
